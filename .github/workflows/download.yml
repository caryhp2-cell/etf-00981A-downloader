name: Download 00981A ETF

on:
  schedule:
    # 17:00 台北時間 (UTC+8) = 09:00 UTC — 首次嘗試
    - cron: '0 9 * * *'
    # 18:00 台北時間 (UTC+8) = 10:00 UTC — Retry 1（若首次已成功則跳過）
    - cron: '0 10 * * *'
    # 19:00 台北時間 (UTC+8) = 11:00 UTC — Retry 2（若前次已成功則跳過）
    - cron: '0 11 * * *'
  workflow_dispatch:  # 允許在 Actions 頁面手動觸發

permissions:
  contents: write  # 需要寫入權限才能 commit 下載後的 xlsx 回 repo

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if already downloaded today
        id: check
        run: |
          TODAY=$(TZ=Asia/Taipei date +%Y-%m-%d)
          FILE="downloads/00981A_${TODAY}.xlsx"
          if [ -f "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "今天 ($TODAY) 的檔案已存在，略過本次執行。"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "今天 ($TODAY) 的檔案尚未下載，開始執行。"
          fi

      - name: Set up Python 3.12
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ubuntu-latest runners 已預先安裝 Google Chrome；
      # Selenium 4.6+ 內建的 Selenium Manager 會自動下載對應版本的 chromedriver。
      - name: Show Chrome version (debug)
        if: steps.check.outputs.skip != 'true'
        run: google-chrome --version

      - name: Run downloader
        if: steps.check.outputs.skip != 'true'
        run: python 00981A.py

      - name: Commit and push downloaded file
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add 00981A download $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          fi
