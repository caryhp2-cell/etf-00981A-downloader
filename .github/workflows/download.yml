name: Download 00981A ETF

on:
  schedule:
    # 每天 18:00 台北時間 (UTC+8) = 10:00 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:  # 允許在 Actions 頁面手動觸發

permissions:
  contents: write  # 需要寫入權限才能 commit 下載後的 xlsx 回 repo

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ubuntu-latest runners 已預先安裝 Google Chrome；
      # Selenium 4.6+ 內建的 Selenium Manager 會自動下載對應版本的 chromedriver。
      - name: Show Chrome version (debug)
        run: google-chrome --version

      - name: Run downloader
        run: python 00981A.py

      - name: Commit and push downloaded file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add 00981A download $(TZ=Asia/Taipei date +%Y-%m-%d)"
            git push
          fi
